<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- Google Tag Manager -->
    <!--
      GTM container replicado de la landing legacy (sharemechat-landing-prod
      pre-switch) para no perder analitica al pasar el origin de CF al bucket
      SPA. El container ID GTM-T7BNJP4M aplica a PROD; en TEST/AUDIT este
      mismo bundle (compartido) tambien lo dispara, lo que ensucia ligeramente
      la analitica de esos entornos. Aceptado a corto plazo como deuda
      operativa documentada. Env-gate limpio (solo en PROD) propuesto via
      runtime-mount en el SPA (ver runtimeEnv.hostname === 'sharemechat.com')
      como trabajo posterior.
    -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-T7BNJP4M');
    </script>
    <!-- End Google Tag Manager -->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <!-- SEO core (replica de landing legacy: title/description EN como decision por defecto). -->
    <title>1-to-1 Video Chat with Verified Models | SharemeChat</title>
    <meta name="description" content="Live 1-to-1 video chat with verified models. Start with free trial minutes and connect instantly. No subscriptions — pay only for what you use." />
    <!-- canonical retirado (ADR-033 + paso 3 del frente SEO 2026-06-10): el canonical
         hardcoded a la home creaba consolidacion incorrecta en /blog/{slug}, /faq, etc.
         El canonical correcto por ruta lo emite en runtime el componente Seo.jsx (home +
         5 paginas de footer) y los helpers de seoHelpers.js (blog listado + detalle). -->

    <!-- Favicons de marca (replicados del landing legacy). -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- Tipografia -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap">

    <!-- Open Graph -->
    <!--
      og:image / twitter:image: card raster generica de marca 1200x630
      alojada en el bucket de assets canonico. Es lo que ven los crawlers
      sociales SIN ejecucion de JS (FB, X/Twitter, WhatsApp, LinkedIn,
      Reddit, Discord, etc.); Googlebot moderno SI ejecuta JS y obtiene
      ademas la card por-ruta inyectada por <Seo> y por los componentes
      del blog (BlogContent, BlogArticleView). Para previas sociales
      por-articulo se necesitaria prerender server-side (fuera de scope
      de este lote; deuda C registrada).
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SharemeChat" />
    <meta property="og:title" content="1-to-1 Video Chat with Verified Models | SharemeChat" />
    <meta property="og:description" content="Live 1-to-1 video chat with verified models. Start with free trial minutes and connect instantly. No subscriptions — pay only for what you use." />
    <meta property="og:url" content="https://sharemechat.com/" />
    <meta property="og:image" content="https://assets.sharemechat.com/brand/og-default-1200x630.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="SharemeChat — 1-to-1 video chat with verified models" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@shareme_chat" />
    <meta name="twitter:creator" content="@shareme_chat" />
    <meta name="twitter:title" content="1-to-1 Video Chat with Verified Models | SharemeChat" />
    <meta name="twitter:description" content="Live 1-to-1 video chat with verified models. Start with free trial minutes and connect instantly. No subscriptions — pay only for what you use." />
    <meta name="twitter:image" content="https://assets.sharemechat.com/brand/og-default-1200x630.png" />
    <meta name="twitter:image:alt" content="SharemeChat — 1-to-1 video chat with verified models" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SharemeChat",
      "url": "https://sharemechat.com/",
      "description": "Live 1-to-1 video chat with verified models. Start with free trial minutes and connect instantly. No subscriptions — pay only for what you use.",
      "inLanguage": "en",
      "publisher": {
        "@type": "Organization",
        "name": "SharemeChat",
        "url": "https://sharemechat.com/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://assets.sharemechat.com/brand/SharemeChat_white.svg"
        },
        "sameAs": [
          "https://x.com/shareme_chat",
          "https://www.reddit.com/user/sharemechat"
        ]
      }
    }
    </script>
  </head>
  <body>

    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T7BNJP4M"
              height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
