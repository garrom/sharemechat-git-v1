server {
    listen 80;
    server_name api.sharemechat.com;
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.sharemechat.com;

    # CloudFront-aware real_ip (fix perimetro 2026-06-07).
    # set_real_ip_from para los rangos CLOUDFRONT_ORIGIN_FACING
    # publicados por AWS. Cuando el peer TCP es un edge CloudFront,
    # $remote_addr se reescribe a la primera IP del XFF que CF adjunta
    # (= cliente real). Trafico directo (WebSockets /match y /messages,
    # scanners) NO se ve afectado: su peer no esta en CIDR CF y
    # $remote_addr conserva la IP real del peer. El timer
    # sharemechat-cf-cidrs-refresh actualiza el fichero mensualmente.
    include /etc/nginx/cloudfront-origin-facing.conf;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    access_log /var/log/nginx/api.sharemechat.access.log;

    client_max_body_size 60M;

    ssl_certificate /etc/letsencrypt/live/api.sharemechat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sharemechat.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none';" always;

    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        # X-Real-IP / X-Forwarded-For sobreescritos con $remote_addr
        # (= IP real post real_ip). NO usamos $proxy_add_x_forwarded_for
        # porque acumularia el XFF entrante - falsificable cuando un
        # atacante pega directo a api.sharemechat.com con XFF spoofeado.
        # Con sobrescritura, el backend SOLO ve la IP real del peer.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
    }

    location /match {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /messages {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SEO layer (sitemap dinamico + robots.txt) proxypaseados al Spring
    # Boot del backend (SitemapController). Aplica EXACTAMENTE el mismo
    # patron de cabeceras del perimetro ADR-032 del location /api/:
    # X-Real-IP / X-Forwarded-For = $remote_addr (NO acumular XFF). Cero
    # auth en estos paths (SecurityConfig permitAll) y cero gate
    # PRELAUNCH (no son product paths) -> Googlebot desde cualquier IP
    # puede leerlos. Cache headers vienen del propio controller
    # (public, max-age=3600).
    location = /sitemap.xml {
        proxy_pass http://localhost:8080/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
    }

    location = /robots.txt {
        proxy_pass http://localhost:8080/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
    }

    location / {
        return 404;
    }
}
