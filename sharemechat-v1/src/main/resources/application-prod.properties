# =========================================================
# APP ENTORNO PROD
# =========================================================
# Overrides especificos del entorno PROD sobre application.properties.
# Creado en PRO-5.A (2026-05-25). RDS PROD creado en PRO-4. EC2 backend
# PROD se monta en PRO-5 (con la database logica db1_sharemechat_prod
# como sub-paso 1 de PRO-5, diferido del paso 6 de PRO-4 por gap del plan v2).
# =========================================================
spring.application.name=sharemechat-prod

# DataSource (RDS PROD, creado en PRO-4)
spring.datasource.url=jdbc:mysql://db1-sharemechat-prod.c1gsc6qg4l8y.eu-central-1.rds.amazonaws.com:3306/db1_sharemechat_prod

# Auth cookie domain PROD (ADR-015)
auth.cookieDomain=.sharemechat.com

# Auth-risk env namespace PROD
authrisk.env=prod

# Secretos JWT/Consent con prefijo de entorno (aislamiento operativo)
jwt.secret=${JWT_SECRET_PROD}
consent.hmacSecret=${CONSENT_SECRET_PROD}

# URLs frontend PROD (password reset, verify-email)
app.frontend.reset-url=https://sharemechat.com/reset-password
app.frontend.verify-email-product-url=https://sharemechat.com/verify-email
app.frontend.verify-email-admin-url=https://admin.sharemechat.com/verify-email

# Veriff callback URL PROD
kyc.veriff.callback-url=https://sharemechat.com/api/kyc/veriff/webhook

# Public canonical host PROD (ADR-015)
app.public.base-url=https://sharemechat.com

# Asset base URL PROD
app.assets.base-url=https://assets.sharemechat.com

# Cross-surface frontend origins PROD
app.frontend.product-origin=https://sharemechat.com
app.frontend.admin-origin=https://admin.sharemechat.com

# Remitente visible (RFC 5322 From) de los emails transaccionales en PROD.
# Address = mismo mailbox autenticado (operations@), display "SharemeChat".
#
# Por que NO usamos un alias distinto (no-reply+prod, etc.): Microsoft
# Exchange Online rechaza el override del campo From cuando el address
# no coincide con el mailbox autenticado salvo que se haya configurado
# permiso Send-As explicito (probado 2026-06-07, fallo con
# ErrorSendAsDenied 403 -> rollback). La subaddressing plus-tag
# (operations+prod@) es solo para RECIBIR, no para ENVIAR.
#
# Patron actual: address = operations@ (igual que el sender Graph del
# URL path /users/{sender}/sendMail), display = "SharemeChat". Esto
# aplica el From visible "SharemeChat <operations@sharemechat.com>" sin
# requerir Send-As; envio como uno mismo. El asunto sigue siendo el copy
# del EmailCopyRenderer. Sin Reply-To (no se setea en el mensaje).
#
# TEST/AUDIT no sobrescriben sender en sus application-*.properties,
# mantienen el comportamiento default (operations@ sin display name).
email.sender.address=operations@sharemechat.com
email.sender.display-name=SharemeChat

# app.cors.allowed-origins y app.websocket.allowed-origins no se overridean
# (la lista CSV del base cubre los 3 entornos + localhost tras PRO-5.A).
# WebRTC ICE (STUN publicos + TURN dinamico): heredados del base con keys
# WEBRTC_TURN_* sin prefijo entorno (PRO-5.A). El .env de la EC2 PROD
# (creado en PRO-5) define WEBRTC_TURN_URL_UDP/TCP/TLS, WEBRTC_TURN_USERNAME,
# WEBRTC_TURN_CREDENTIAL.
