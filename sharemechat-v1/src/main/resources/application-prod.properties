# =========================================================
# APP ENTORNO PROD
# =========================================================
# Overrides especificos del entorno PROD sobre application.properties.
# Creado en PRO-5.A (2026-05-25). RDS PROD creado en PRO-4. EC2 backend
# PROD se monta en PRO-5 (con la database logica db1_sharemechat_prod
# como sub-paso 1 de PRO-5, diferido del paso 6 de PRO-4 por gap del plan v2).
# =========================================================
spring.application.name=sharemechat-prod

# DataSource (RDS PROD, creado en PRO-4)
spring.datasource.url=jdbc:mysql://db1-sharemechat-prod.c1gsc6qg4l8y.eu-central-1.rds.amazonaws.com:3306/db1_sharemechat_prod

# Auth cookie domain PROD (ADR-015)
auth.cookieDomain=.sharemechat.com

# Auth-risk env namespace PROD
authrisk.env=prod

# Secretos JWT/Consent con prefijo de entorno (aislamiento operativo)
jwt.secret=${JWT_SECRET_PROD}
consent.hmacSecret=${CONSENT_SECRET_PROD}

# URLs frontend PROD (password reset, verify-email)
app.frontend.reset-url=https://sharemechat.com/reset-password
app.frontend.verify-email-product-url=https://sharemechat.com/verify-email
app.frontend.verify-email-admin-url=https://admin.sharemechat.com/verify-email

# Veriff callback URL PROD
kyc.veriff.callback-url=https://sharemechat.com/api/kyc/veriff/webhook

# Didit callback URL PROD (ADR-035)
kyc.didit.callback-url=https://sharemechat.com/api/kyc/didit/webhook

# =========================================================
# Didit PROD ACTIVADO 2026-07-18.
# Historico: override kyc.didit.enabled=false introducido 2026-07-06
# (nivelacion ADR-045) como belt-and-suspenders durante la fase
# coming-soon. Retirado hoy tras cumplir los 4 pasos de reactivacion:
#   1. KYC_DIDIT_API_KEY + API_SECRET + los 2 workflow UUIDs reales
#      poblados en /opt/sharemechat/secrets.env de PROD (API key nueva
#      dedicada shareme-prod-key + webhook secret del destino
#      shareme-prod-kyc, ambos generados en la consola Didit el
#      2026-07-18 en el workspace "My Application" modo Produccion).
#   2. KYC_DIDIT_ENABLED=true anadido a /opt/sharemechat/config.env de
#      PROD junto con KYC_DIDIT_MODEL/CLIENT_CALLBACK_URL apuntando a
#      https://sharemechat.com/...
#   3. active_mode en kyc_provider_config se crea automaticamente
#      al arrancar (DiditProviderConfigService).
#   4. Smoke del POST /v2/session/ contra Didit API pasado (HTTP 201).
# Retencion de datos biometricos: verificada a 6 meses en consola
# Didit (obligatorio ADR-035 punto 4, verificado 2026-07-18).
# TEST/AUDIT sin cambios (application-test/audit.properties siguen
# heredando de base y sus secrets.env llevan sus valores).
# =========================================================
kyc.didit.api-key=${KYC_DIDIT_API_KEY:}
kyc.didit.api-secret=${KYC_DIDIT_API_SECRET:}
kyc.didit.model-workflow-id=${KYC_DIDIT_MODEL_WORKFLOW_ID:}
kyc.didit.client-workflow-id=${KYC_DIDIT_CLIENT_WORKFLOW_ID:}

# Stream moderation visual vendor callback URL PROD (ADR-036/ADR-037)
moderation.sightengine.callback-url=https://sharemechat.com/api/webhooks/moderation/sightengine

# =========================================================
# Sightengine PROD ACTIVADO 2026-07-18.
# Historico: override moderation.sightengine.enabled=false introducido
# 2026-07-06 (nivelacion ADR-045) como belt-and-suspenders durante la
# fase coming-soon. Retirado hoy tras cumplir los 3 pasos de reactivacion:
#   1. MODERATION_SIGHTENGINE_API_SECRET real poblado en
#      /opt/sharemechat/secrets.env de PROD (via pipeline SSH atomico
#      ssh test-backend | ssh prod-backend tee, patron T1 documentado
#      en incident-notes.md - la clave es la misma de TEST porque
#      ADR-037 declara cuenta unica compartida entre TEST/AUDIT/PROD).
#   2. MODERATION_SIGHTENGINE_API_USER, WORKFLOW_ID y ENABLED=true
#      anadidos a /opt/sharemechat/config.env (no sensibles).
#      WORKFLOW_ID = wfl_kVAtM2rkY4uiyMcyPBhUB (consolidado, publico).
#   3. active_mode en stream_moderation_provider_config cambiado de
#      MOCK a SIGHTENGINE en RDS PROD (UPDATE directo, la fila la creo
#      el seed V10 en su momento).
# WEBHOOK_SECRET queda vacio a proposito: TEST tampoco lo tenia
# configurado y el flujo Sightengine actual es sincrono request/response
# (no webhook async). El endpoint publico /api/webhooks/moderation/*
# responde 401 controlado si algun dia llega firma - no bloquea.
# Retencion GDPR de Sightengine: gestion sobre imagenes efimeras del
# stream; no persistimos payload en BD salvo severity>=AMBER (evidencia
# S3 con TTL 30d configurado en application-prod.properties).
# TEST/AUDIT sin cambios.
# =========================================================
moderation.sightengine.api-user=${MODERATION_SIGHTENGINE_API_USER:}
moderation.sightengine.api-secret=${MODERATION_SIGHTENGINE_API_SECRET:}
moderation.sightengine.workflow-id=${MODERATION_SIGHTENGINE_WORKFLOW_ID:}
moderation.sightengine.webhook-secret=${MODERATION_SIGHTENGINE_WEBHOOK_SECRET:}

# Stream moderation evidence S3 bucket PROD (DEC-3 P2.1, DEC-12 region).
# Bucket NO aprovisionado en P2.1; queda placeholder hasta sub-paquete posterior.
moderation.evidence.s3.bucket=sharemechat-moderation-evidence-prod
moderation.evidence.s3.region=eu-central-1

# Public canonical host PROD (ADR-015)
app.public.base-url=https://sharemechat.com

# Asset base URL PROD
app.assets.base-url=https://assets.sharemechat.com

# Cross-surface frontend origins PROD
app.frontend.product-origin=https://sharemechat.com
app.frontend.admin-origin=https://admin.sharemechat.com

# Remitente visible (RFC 5322 From) de los emails transaccionales en PROD.
# Address = mismo mailbox autenticado (operations@), display "SharemeChat".
#
# Por que NO usamos un alias distinto (no-reply+prod, etc.): Microsoft
# Exchange Online rechaza el override del campo From cuando el address
# no coincide con el mailbox autenticado salvo que se haya configurado
# permiso Send-As explicito (probado 2026-06-07, fallo con
# ErrorSendAsDenied 403 -> rollback). La subaddressing plus-tag
# (operations+prod@) es solo para RECIBIR, no para ENVIAR.
#
# Patron actual: address = operations@ (igual que el sender Graph del
# URL path /users/{sender}/sendMail), display = "SharemeChat". Esto
# aplica el From visible "SharemeChat <operations@sharemechat.com>" sin
# requerir Send-As; envio como uno mismo. El asunto sigue siendo el copy
# del EmailCopyRenderer. Sin Reply-To (no se setea en el mensaje).
#
# TEST/AUDIT no sobrescriben sender en sus application-*.properties,
# mantienen el comportamiento default (operations@ sin display name).
email.sender.address=operations@sharemechat.com
email.sender.display-name=SharemeChat

# app.cors.allowed-origins y app.websocket.allowed-origins no se overridean
# (la lista CSV del base cubre los 3 entornos + localhost tras PRO-5.A).
# WebRTC ICE (STUN publicos + TURN dinamico): heredados del base con keys
# WEBRTC_TURN_* sin prefijo entorno (PRO-5.A). El .env de la EC2 PROD
# (creado en PRO-5) define WEBRTC_TURN_URL_UDP/TCP/TLS, WEBRTC_TURN_USERNAME,
# WEBRTC_TURN_CREDENTIAL.
