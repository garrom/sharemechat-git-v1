# =========================================================
# APP ENTORNO TEST
# =========================================================
# Overrides especificos del entorno TEST sobre application.properties.
# Creado en PRO-5.A (2026-05-25): la limpieza de defaults sesgados en
# application.properties obliga a que TEST tenga su propio fichero
# explicito con todas las URLs/endpoints literales de TEST.
# =========================================================

# DataSource (RDS TEST)
spring.datasource.url=jdbc:mysql://db1-sharemechat-test-v2.c1gsc6qg4l8y.eu-central-1.rds.amazonaws.com:3306/db1_sharemechat_test

# Auth cookie domain TEST
auth.cookieDomain=.test.sharemechat.com

# Auth-risk env namespace TEST
authrisk.env=test

# URLs frontend TEST (password reset, verify-email)
app.frontend.reset-url=https://test.sharemechat.com/reset-password
app.frontend.verify-email-product-url=https://test.sharemechat.com/verify-email
app.frontend.verify-email-admin-url=https://admin.test.sharemechat.com/verify-email

# Veriff callback URL TEST
kyc.veriff.callback-url=https://test.sharemechat.com/api/kyc/veriff/webhook

# Didit callback URL TEST (ADR-035)
kyc.didit.callback-url=https://test.sharemechat.com/api/kyc/didit/webhook

# Public canonical host TEST (ADR-015)
app.public.base-url=https://test.sharemechat.com

# Asset base URL TEST (paquete 10.A.5)
app.assets.base-url=https://assets.test.sharemechat.com

# Cross-surface frontend origins TEST
app.frontend.product-origin=https://test.sharemechat.com
app.frontend.admin-origin=https://admin.test.sharemechat.com

# WebRTC TURN URLs/credenciales TEST.
# Tras PRO-5.A las env vars consumidas por application.properties son
# WEBRTC_TURN_URL_UDP/TCP/TLS, WEBRTC_TURN_USERNAME, WEBRTC_TURN_CREDENTIAL
# (sin prefijo de entorno). El dia que la EC2 TEST reciba el JAR
# refactorizado, el operador debe renombrar en /opt/sharemechat/.env:
#   TEST_WEBRTC_TURN_*   ->   WEBRTC_TURN_*
# Hasta ese deploy, la EC2 TEST sigue corriendo el JAR antiguo que usa
# los nombres con prefijo (legacy compatible).
