# =========================================================
# APP ENTORNO AUDIT
# =========================================================
# Overrides especificos del entorno AUDIT sobre application.properties.
# Actualizado en PRO-5.A (2026-05-25): los placeholders de application.properties
# que tenian default sesgado TEST (categoria C del inventario PRO-5.A) ya no
# tienen default; AUDIT los provee con su valor mediante este fichero.
# El bloque app.webrtc.ice-servers[2].* desaparece como override AUDIT porque
# el naming WEBRTC_TURN_* ya no lleva prefijo de entorno (PRO-5.A). La EC2
# AUDIT, en el dia que reciba el JAR refactorizado, debe renombrar en
# /opt/sharemechat/.env las keys AUDIT_WEBRTC_TURN_* -> WEBRTC_TURN_*.
# =========================================================
spring.application.name=sharemechat-audit

# DataSource (RDS AUDIT)
spring.datasource.url=jdbc:mysql://db1-sharemechat-audit.c1gsc6qg4l8y.eu-central-1.rds.amazonaws.com:3306/db1_sharemechat_audit

# Auth cookie domain AUDIT
auth.cookieDomain=.audit.sharemechat.com

# Auth-risk env namespace AUDIT
authrisk.env=audit

# Secretos JWT/Consent con prefijo de entorno (aislamiento operativo)
jwt.secret=${JWT_SECRET_AUDIT}
consent.hmacSecret=${CONSENT_SECRET_AUDIT}

# URLs frontend AUDIT (password reset, verify-email)
app.frontend.reset-url=https://audit.sharemechat.com/reset-password
app.frontend.verify-email-product-url=https://audit.sharemechat.com/verify-email
app.frontend.verify-email-admin-url=https://admin.audit.sharemechat.com/verify-email

# Veriff callback URL AUDIT
kyc.veriff.callback-url=https://audit.sharemechat.com/api/kyc/veriff/webhook

# Didit callback URL AUDIT (ADR-035)
kyc.didit.callback-url=https://audit.sharemechat.com/api/kyc/didit/webhook

# Stream moderation visual vendor callback URL AUDIT (ADR-036/ADR-037)
moderation.sightengine.callback-url=https://audit.sharemechat.com/api/webhooks/moderation/sightengine

# Stream moderation evidence S3 bucket AUDIT (DEC-3 P2.1, DEC-12 region).
# Bucket NO aprovisionado en P2.1; queda placeholder hasta sub-paquete posterior.
moderation.evidence.s3.bucket=sharemechat-moderation-evidence-audit
moderation.evidence.s3.region=eu-central-1

# Public canonical host AUDIT (ADR-015)
app.public.base-url=https://audit.sharemechat.com

# Asset base URL AUDIT (paquete 10.A.5)
app.assets.base-url=https://assets.audit.sharemechat.com

# Cross-surface frontend origins AUDIT
app.frontend.product-origin=https://audit.sharemechat.com
app.frontend.admin-origin=https://admin.audit.sharemechat.com

# app.cors.allowed-origins y app.websocket.allowed-origins no se overridean
# (la lista CSV del base cubre los 3 entornos + localhost tras PRO-5.A).
# WebRTC ICE (STUN publicos + TURN dinamico): heredados del base. PRO-5.A
# migro las TURN keys a WEBRTC_TURN_* sin prefijo entorno.
