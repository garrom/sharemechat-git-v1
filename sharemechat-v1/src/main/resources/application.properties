# =========================================================
# APP DEFAULTS GLOBALES SANOS
# =========================================================
# Este fichero contiene SOLO defaults globales sanos compartidos por todos los
# entornos. Los valores especificos de cada entorno viven en:
#   - application-test.properties  (perfil 'test')
#   - application-audit.properties (perfil 'audit')
#   - application-prod.properties  (perfil 'prod')
#
# Activacion del perfil obligatoria: --spring.profiles.active=<env> o
# SPRING_PROFILES_ACTIVE=<env>. Sin perfil, el arranque FALLA con
# IllegalStateException por placeholders no resolubles (categoria C
# limpiada en PRO-5.A; ver docs/06-decisions/plan-v2 PRO-5.A).
# =========================================================
spring.application.name=sharemechat-v1

# =========================================================
# Server / Interfaces
# =========================================================
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=native

# =========================================================
# DataSource (MySQL) - el endpoint concreto vive en application-<env>.properties
# =========================================================
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# EMAIL
# =========================================================
email.provider=${EMAIL_PROVIDER:graph}
email.default-from=${EMAIL_DEFAULT_FROM:operations@sharemechat.com}
email.graph.base-url=${EMAIL_GRAPH_BASE_URL:https://graph.microsoft.com}
email.graph.authority-base-url=${EMAIL_GRAPH_AUTHORITY_BASE_URL:https://login.microsoftonline.com}
email.graph.tenant-id=${EMAIL_GRAPH_TENANT_ID:}
email.graph.client-id=${EMAIL_GRAPH_CLIENT_ID:}
email.graph.client-secret=${EMAIL_GRAPH_CLIENT_SECRET:}
email.graph.save-to-sent-items=${EMAIL_GRAPH_SAVE_TO_SENT_ITEMS:false}
spring.mail.host=smtp.mail.eu-west-1.awsapps.com
spring.mail.port=465
spring.mail.username=operations@sharemechat.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.default-encoding=UTF-8

# =========================================================
# AUTH - cookieDomain concreto vive en application-<env>.properties
# =========================================================
auth.secureCookies=true

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# =========================================================
# Flyway (ADR-025)
# =========================================================
# Schema migration tool. Coexiste con ddl-auto=validate: Flyway aplica
# las migraciones SQL bajo classpath:db/migration/; Hibernate verifica
# que el schema resultante coincide con las entidades JPA al arrancar.
# El backend rompe el arranque si alguna divergencia aparece.
#
# Para entornos existentes (TEST, AUDIT), el operador ejecuta una vez
# `flyway baseline -baselineVersion=1` y a partir de ahi Flyway aplica
# automaticamente cualquier V2/V3/... pendiente en cada arranque del
# backend. Procedimiento documentado en
# docs/04-operations/runbooks/cms-v2-flyway-introduction.md.
#
# Override: SPRING_FLYWAY_ENABLED=false desactiva Flyway (util durante
# la propia fase de baseline antes de tener flyway_schema_history).
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# =========================================================
# Redis (provisional)
# =========================================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=${REDIS_PASSWORD}
stream.status.ttl-seconds=45

# =========================================================
# Matching Next
# =========================================================
matching.next.limit-per-window=20
matching.next.window-seconds=60

# =========================================================
# Seen TTL
# =========================================================
matching.seen.ttl-minutes=45
matching.seen.max-scan=60

# =========================================================
# SECURITY RATE LIMIT
# =========================================================
security.ratelimit.login.limit=5
security.ratelimit.login.window-seconds=60
security.ratelimit.reset.limit=5
security.ratelimit.reset.window-seconds=900
security.ratelimit.register.limit=5
security.ratelimit.register.window-seconds=900
security.ratelimit.refresh.limit=60
security.ratelimit.refresh.window-seconds=300

# =========================================================
# WS RATE LIMIT (/messages)
# =========================================================
security.ratelimit.ws.msg.limit=20
security.ratelimit.ws.msg.window-seconds=10
security.ratelimit.ws.call.limit=5
security.ratelimit.ws.call.window-seconds=60
security.ratelimit.ws.ping.limit=30
security.ratelimit.ws.ping.window-seconds=10
# ADR-049 Subpasada 2B: rate limit del endpoint publico
# POST /api/public/affiliate/magic-link. Contra abuso de envio masivo
# de emails desde el mismo origen (D12). Ventana horaria por IP.
security.ratelimit.affiliate-magic-link.limit=5
security.ratelimit.affiliate-magic-link.window-seconds=3600

# =========================================================
# AUTH-RISK (modo OBSERVE)
# =========================================================
authrisk.enabled=${AUTHRISK_ENABLED:false}
# authrisk.env: sin default. Cada application-<env>.properties lo define a su valor.
authrisk.env=${AUTHRISK_ENV}
authrisk.email-hash-salt=${AUTHRISK_EMAIL_HASH_SALT:}
authrisk.ttl.short-seconds=900
authrisk.ttl.long-seconds=3600
authrisk.response.enabled=${AUTHRISK_RESPONSE_ENABLED:false}
authrisk.response.high-delay-min-ms=750
authrisk.response.high-delay-max-ms=1500
authrisk.response.critical-block-seconds=600

# =========================================================
# JWT
# =========================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=1209600000

# =========================================================
# Multipart / Upload limits (Spring)
# =========================================================
# =========================================================
# PRODUCT OPERATIONAL MODE (ADR-009)
# =========================================================
# Modo principal de admision al producto. Valores: OPEN | PRELAUNCH | MAINTENANCE | CLOSED.
# Default OPEN para preservar comportamiento previo.
product.access.mode=${PRODUCT_ACCESS_MODE:OPEN}
# Lista CSV de userIds exentos del gate cuando el modo es restrictivo.
# Definida pero NO operativa en esta iteracion (ver ProductOperationalModeService).
product.access.allowlist.user-ids=${PRODUCT_ACCESS_ALLOWLIST_USER_IDS:}
# Flags independientes del modo para registro de cliente y de modelo.
product.registration.client.enabled=${PRODUCT_REGISTRATION_CLIENT_ENABLED:true}
product.registration.model.enabled=${PRODUCT_REGISTRATION_MODEL_ENABLED:true}
# Flag independiente del modo para endpoints económicos directos (simulación).
# Gatea exclusivamente POST /api/transactions/first y POST /api/transactions/add-balance.
# Default false: en PROD no debe acreditarse saldo sin pasar por PSP. TEST/AUDIT activan
# por variable de entorno cuando proceda.
product.simulation.transactions-direct.enabled=${PRODUCT_SIMULATION_TRANSACTIONS_DIRECT_ENABLED:false}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# =========================================================
# WebSocket (buffers)
# =========================================================
spring.web-socket.max-text-message-buffer-size=32768
spring.web-socket.max-binary-message-buffer-size=32768

# =========================================================
# Facturacion
# =========================================================
billing.rate-per-minute=1.00
billing.cutoff-threshold-eur=1.00
gift.model-share=0.90

# =========================================================
# Password reset y verify-email - URLs concretas viven en application-<env>.properties
# =========================================================
password-reset.ttl-minutes=30

# =========================================================
# AFFILIATE PROGRAM (ADR-049)
# =========================================================
# Nombre de la cookie que persiste el codigo de referral en el navegador
# del visitante. HttpOnly, SameSite=Lax, Secure si HTTPS. TTL de 90 dias
# alineado con business doc (last-touch). Underscore intencional para
# evitar escapes en cabeceras Set-Cookie.
affiliate.cookie.name=sharemechat_affiliate_ref
affiliate.cookie.ttl-days=90
# TTL del magic link temprano (ADR-049 D12, patron Uber/Airbnb): 72 horas.
affiliate.magic-link.ttl-hours=72
# Bono de bienvenida al cliente atribuido (ADR-049 D7): 10 EUR. Poner 0
# para desactivar el bono globalmente sin retirar el codigo del listener.
affiliate.welcome-bonus.amount-eur=10.00
# URL publica base del landing (ADR-049 D12). En AUDIT/PROD se sobrescribe
# via env var. La usa el consume del magic link para el redirect 302.
affiliate.landing.base-url=${AFFILIATE_LANDING_BASE_URL:https://test.sharemechat.com}
# Reutilizacion de la salt de authrisk para hashear ip y user-agent en
# affiliate_click_events (ADR-049 update D-24, minimiza superficie de
# properties). Alias explicito para dejarlo trazable en el codigo.
affiliate.hash-salt=${authrisk.email-hash-salt}

# =========================================================
# Storage
# =========================================================
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.proxy.path=/api/storage/content
app.storage.local.root=${APP_STORAGE_LOCAL_ROOT:/usr/share/nginx/html/uploads}
app.storage.allowed-extensions=jpg,jpeg,png,webp,gif,mp4,webm,pdf
app.storage.max-file-size-bytes=52428800
app.storage.max-basename-length=80
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.key-prefix=${APP_STORAGE_S3_KEY_PREFIX:private-uploads}
app.storage.s3.path-style-access=${APP_STORAGE_S3_PATH_STYLE_ACCESS:false}
app.storage.s3.server-side-encryption=${APP_STORAGE_S3_SERVER_SIDE_ENCRYPTION:AES256}

# =========================================================
# Content storage (ADR-010, Fase 1)
# Bucket S3 privado dedicado al CMS, separado del bucket de uploads
# privados (KYC, perfiles). Si el bucket esta vacio, los endpoints
# de cuerpo del articulo fallan en runtime con 503; el resto del
# CMS sigue operativo (CRUD de metadata).
# =========================================================
app.storage.s3.content.region=${APP_STORAGE_S3_CONTENT_REGION:eu-central-1}
app.storage.s3.content.private-bucket=${APP_STORAGE_S3_CONTENT_PRIVATE_BUCKET:}
app.storage.s3.content.private-key-prefix=${APP_STORAGE_S3_CONTENT_PRIVATE_KEY_PREFIX:content}

# =========================================================
# Content (ADR-010)
# =========================================================
content.public.index-enabled=${CONTENT_PUBLIC_INDEX_ENABLED:false}
content.ai-mode=${CONTENT_AI_MODE:MANUAL}
content.body.max-bytes=${CONTENT_BODY_MAX_BYTES:204800}

# =========================================================
# Public canonical host (ADR-015)
# Used by SEO layer (sitemap, canonical, JSON-LD, meta tags).
# Sin default: cada application-<env>.properties lo define.
# =========================================================
app.public.base-url=${APP_PUBLIC_BASE_URL}

# =========================================================
# Asset base URL del entorno (CDN-served). Paquete 10.A.5.
# Override por entorno: el bucket S3 de assets de TEST sirve
# desde assets.test.sharemechat.com, el de AUDIT desde
# assets.audit.sharemechat.com, el de PROD desde assets.sharemechat.com.
# Sin default: cada application-<env>.properties lo define.
# =========================================================
app.assets.base-url=${APP_ASSETS_BASE_URL}

# =========================================================
# Cross-surface frontend origins (paquete 10.A.5).
# Override por entorno: TEST -> test.sharemechat.com /
# admin.test.sharemechat.com; AUDIT -> audit.sharemechat.com /
# admin.audit.sharemechat.com; PROD -> sharemechat.com /
# admin.sharemechat.com. Sin default.
# =========================================================
app.frontend.product-origin=${APP_FRONTEND_PRODUCT_ORIGIN}
app.frontend.admin-origin=${APP_FRONTEND_ADMIN_ORIGIN}

# =========================================================
# CORS allowed origins (paquete 10.A.5). Lista CSV que cubre
# las tres superficies (producto/admin/assets) de los tres
# entornos (TEST/AUDIT/PROD) + localhost. NO se overridea por
# entorno: la lista vale igual en los tres.
# =========================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://test.sharemechat.com,https://www.test.sharemechat.com,https://admin.test.sharemechat.com,https://audit.sharemechat.com,https://www.audit.sharemechat.com,https://admin.audit.sharemechat.com,https://sharemechat.com,https://www.sharemechat.com,https://admin.sharemechat.com,http://localhost:3000}

# =========================================================
# WebSocket allowed origins (paquete 10.A.5). Lista CSV de
# origenes que pueden establecer conexion WS contra /match y
# /messages. Cubre los 3 entornos (producto) + localhost.
# NO se overridea por entorno: la lista vale igual en los tres.
# Solo apex de producto: /match y /messages se sirven bajo el host
# del producto (ADR-015). admin.* y www.* no abren WS.
# =========================================================
app.websocket.allowed-origins=${APP_WEBSOCKET_ALLOWED_ORIGINS:https://test.sharemechat.com,https://audit.sharemechat.com,https://sharemechat.com,http://localhost:3000}

# =========================================================
# WebRTC / ICE
# Naming sin prefijo de entorno (PRO-5.A). Cada `.env` define
# WEBRTC_TURN_* con el valor de su entorno. TEST/AUDIT deben
# renombrar las keys del .env desde TEST_WEBRTC_TURN_* /
# AUDIT_WEBRTC_TURN_* a WEBRTC_TURN_* el dia que reciban el
# JAR refactorizado (deuda operativa documentada).
# =========================================================
app.webrtc.ice-servers[0].urls[0]=${WEBRTC_ICE_SERVER_0_URLS:stun:stun.l.google.com:19302}
app.webrtc.ice-servers[1].urls[0]=${WEBRTC_ICE_SERVER_1_URLS:stun:global.stun.twilio.com:3478}
app.webrtc.ice-servers[2].urls[0]=${WEBRTC_TURN_URL_UDP:}
app.webrtc.ice-servers[2].urls[1]=${WEBRTC_TURN_URL_TCP:}
app.webrtc.ice-servers[2].urls[2]=${WEBRTC_TURN_URL_TLS:}
app.webrtc.ice-servers[2].username=${WEBRTC_TURN_USERNAME:}
app.webrtc.ice-servers[2].credential=${WEBRTC_TURN_CREDENTIAL:}

# =========================================================
# CONSENT / AGE-GATE
# =========================================================
consent.hmacSecret=${CONSENT_SECRET}
consent.retentionDays=180
terms.version=v1

# =========================================================
# LEGAL DOCS (single source of truth for public links)
# =========================================================
legal.baseUrl=https://assets.sharemechat.com/legal
legal.modelContractPath=/model_contract.pdf

# =========================================================
# KYC VERIFF - callback-url concreta vive en application-<env>.properties
# =========================================================
kyc.veriff.enabled=false
kyc.veriff.base-url=https://stationapi.veriff.com
kyc.veriff.api-key=
kyc.veriff.api-secret=
kyc.veriff.vendor-data-prefix=smc

# =========================================================
# KYC DIDIT - ADR-035 vendor unico Plan A. callback-url concreta vive en
# application-<env>.properties. enabled=false en defaults: hasta que no
# tengamos api-key + secret_shared_key, el cliente devuelve un sessionId
# "didit_mock_<uuid>" sin llamar a la API real (igual patron MOCK que Veriff).
#
# api-key:    cabecera HTTP x-api-key del POST /v3/session/ (NO Bearer).
# api-secret: secret_shared_key del DESTINO de webhook (scoped por destino,
#             distinto del api-key). Solo se usa para VERIFICAR webhooks
#             ENTRANTES via HMAC-SHA256 sobre el raw body.
# workflow-id: UUID del workflow en el Workflow Builder de Didit que define
#             los pasos de KYC modelo (Document + Selfie + Liveness).
# =========================================================
kyc.didit.enabled=false
kyc.didit.base-url=https://verification.didit.me
# callback-url: legacy/shared, fallback. Especificos por flujo:
# model-callback-url (KYC_DIDIT_MODEL_CALLBACK_URL) -> redirect tras flujo modelo.
# client-callback-url (KYC_DIDIT_CLIENT_CALLBACK_URL) -> redirect tras flujo cliente.
# Si la especifica esta blank, se usa callback-url (compat con frente Email Gate).
kyc.didit.model-callback-url=
kyc.didit.client-callback-url=
kyc.didit.api-key=
kyc.didit.api-secret=
# V9 (frente Didit cliente, 2026-06-14): hay dos workflow ids, uno por flujo.
# Antes era kyc.didit.workflow-id (renombrado por simetria). Env vars en TEST:
# KYC_DIDIT_MODEL_WORKFLOW_ID y KYC_DIDIT_CLIENT_WORKFLOW_ID (Spring relaxed
# binding). Su poblacion real en config.env queda fuera de este paso.
kyc.didit.model-workflow-id=
kyc.didit.client-workflow-id=
kyc.didit.vendor-data-prefix=smc

# =========================================================
# LOGGING: DEBUG - TRACE - WARN - INFO
# =========================================================
logging.level.root=INFO
# Spring
logging.level.org.springframework=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.security=WARN
# Hibernate / JPA
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
# Hikari / pool
logging.level.com.zaxxer.hikari=WARN
# General app
logging.level.com.sharemechat=INFO
logging.level.com.sharemechat.ws=INFO
# Controllers
logging.level.com.sharemechat.controller=INFO
# Exceptions
logging.level.com.sharemechat.exception=INFO
# Services
logging.level.com.sharemechat.service=INFO
# Servicios core
logging.level.com.sharemechat.service.StreamService=INFO
logging.level.com.sharemechat.service.TransactionService=INFO
# Handlers WS: bajar ruido
logging.level.com.sharemechat.handler=WARN
logging.level.com.sharemechat.handler.MatchingHandler=WARN
logging.level.com.sharemechat.handler.MatchingHandlerSupport=WARN
logging.level.com.sharemechat.handler.MessagesWsHandler=WARN
logging.level.com.sharemechat.handler.MessagesWsHandlerSupport=WARN
# Hikari / config
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=20000

# =========================================================
# COUNTRY ACCESS (allowlist por flujo - hardening post-PRO 2026-05-27)
# =========================================================
# Modelo: deny all + allow explicit. Dos allowlists separadas:
#  - client-registration.allowed-countries: paises validos para POST /api/users/register/client
#  - model-registration.allowed-countries:  paises validos para POST /api/users/register/model
# Login/refresh/admin-login usan la UNION de ambas.
# bypass-ips (CSV de IPs o CIDR): saltan TODA validacion de pais (PSPs + operador).
# Respuesta uniforme HTTP 403 "Registro no disponible" sin filtrar scope ni pais (OPSEC).
# Defaults vacios = deny all si no se configura el override per-entorno.
country.access.enabled=${COUNTRY_ACCESS_ENABLED:true}
country.access.block-when-missing=${COUNTRY_ACCESS_BLOCK_WHEN_MISSING:true}
country.access.client-registration.allowed-countries=${COUNTRY_ACCESS_CLIENT_REGISTRATION_ALLOWED_COUNTRIES:}
country.access.model-registration.allowed-countries=${COUNTRY_ACCESS_MODEL_REGISTRATION_ALLOWED_COUNTRIES:}
country.access.bypass-ips=${COUNTRY_ACCESS_BYPASS_IPS:}
# DEPRECATED (2026-05-27): blocklist random sustituida por allowlist por flujo.
# Conservada comentada para referencia historica. El codigo nuevo NO lee estas keys.
# country.access.blocked-countries=NL,JP,RO,PL,US,MX,CA,CH,NO,SG
# country.access.blocked-message=Access to SharemeChat is not available from your location.

# =========================================================
# STREAM MODERATION VENDOR (visual) - ADR-030, ADR-036, ADR-037.
# Plan A: Sightengine. Plan B/C: Hive / AWS Rekognition (contingencias
# documentadas, no activas). Modo activo se decide en BD via
# stream_moderation_provider_config.active_mode (calca
# kyc_provider_config). enabled=false en defaults: hasta que no haya
# api-user + api-secret, el adapter Sightengine devuelve verdicts
# MOCK GREEN sin llamar a la API real (mismo patron MOCK que Didit).
#
# api-user / api-secret:  credenciales del workflow consolidado de
#                         Sightengine. Spring relaxed binding -
#                         MODERATION_SIGHTENGINE_API_USER y
#                         MODERATION_SIGHTENGINE_API_SECRET en config.env.
# workflow-id:            UUID del workflow consolidado (Workflow
#                         Builder de Sightengine).
# webhook-secret:         secret HMAC para validar webhooks ENTRANTES
#                         (variante "Standard" sobre raw body, calca
#                         patron Didit + reutiliza HmacSha256).
# callback-url:           override per-entorno en application-<env>.properties.
# =========================================================
moderation.sightengine.enabled=false
moderation.sightengine.base-url=https://api.sightengine.com
moderation.sightengine.api-user=
moderation.sightengine.api-secret=
moderation.sightengine.workflow-id=
moderation.sightengine.webhook-secret=

# =========================================================
# STREAM MODERATION SAMPLING - cadencia y modo de fallo (ADR-036
# bloques 2 y 3). Sobreescribibles por env vars
# MODERATION_SAMPLING_CADENCE_SECONDS,
# MODERATION_FAILURE_DEGRADED_THRESHOLD_MINUTES,
# MODERATION_FAILURE_CUT_THRESHOLD_MINUTES (Spring relaxed binding).
# =========================================================
moderation.sampling.cadence-seconds=15
moderation.failure.degraded-threshold-minutes=2
moderation.failure.cut-threshold-minutes=5

# =========================================================
# LIVENESS CHALLENGE (ADR-050 Fase B) - anti-fraude camara Nivel 2.
# Reutiliza credenciales de moderation.sightengine.* (mismo vendor, endpoint
# distinto /1.0/check.json?models=face-attributes). Kill-switch por
# entorno con MODERATION_LIVENESS_ENABLED. Umbrales calibrables sin
# redeploy via env var (deuda #D-26).
# =========================================================
moderation.liveness.enabled=false
# D3: TTL del pass en segundos. 86400 = 24h (1 challenge/dia).
moderation.liveness.ttl-seconds=86400
# D5 fail-closed-soft: TTL corto cuando SightEngine cae. 300 = 5 min.
moderation.liveness.ttl-vendor-unavailable-seconds=300
# D6 rate limit: max FAILED consecutivos en 24h antes de cooldown.
moderation.liveness.max-failed-attempts-per-day=3
# D6 cooldown post-max-fails en segundos. 300 = 5 min.
moderation.liveness.cooldown-seconds=300
# Numero de frames enviados por verify.
moderation.liveness.frames-required=3
# Deadline para completar verify tras startChallenge (segundos).
moderation.liveness.pending-ttl-seconds=120
# D10 retention: dias antes de purga de filas historicas.
moderation.liveness.retention-days=90
# D4 umbrales por challenge type (probabilidad [0,1] u ángulo grados).
# BLINK/TURN/SMILE quedan legacy tras el refactor 2026-07-13 a PRESENCE;
# se conservan por compat con filas historicas.
moderation.liveness.thresholds.blink.min-eyes-closed=0.5
moderation.liveness.thresholds.blink.max-eyes-open=0.3
moderation.liveness.thresholds.turn.min-yaw-diff-degrees=15
moderation.liveness.thresholds.smile.min-score=0.6
moderation.liveness.thresholds.smile.max-score-neutral=0.3
# PRESENCE (fix 2026-07-13): usa landmarks (left_eye/right_eye/nose_tip)
# en vez de scores (smile/eyes/yaw) porque SightEngine face-attributes
# NO devuelve esos scores en el plan actual. Umbral de distancia
# euclidea acumulada en coordenadas normalizadas [0, 1] del frame.
moderation.liveness.thresholds.presence.min-landmark-delta=0.02
moderation.liveness.thresholds.presence.min-delta=0.05
moderation.liveness.thresholds.presence.min-faces-detected=2

# =========================================================
# STREAM MODERATION - Sightengine runtime overrides (P2.1).
# Spring relaxed binding sobre MODERATION_SIGHTENGINE_* declaradas en
# /opt/sharemechat/config.env (no-sensitive) y /opt/sharemechat/secrets.env
# (api-secret). Sin override aqui: el binding viene directo de env vars
# cuando se inyectan al systemd unit (EnvironmentFile).
# =========================================================

# =========================================================
# STREAM MODERATION - Bucket S3 evidencia (DEC-3 P2.1).
# Bucket dedicado por entorno (sharemechat-moderation-evidence-{env});
# SSE-S3 AES256 y lifecycle TTL 30 dias gestionados en el bucket
# (creacion manual fuera de codigo). Si bucket o region blank, el
# uploader queda como no-op silencioso (log warn).
# =========================================================
moderation.evidence.s3.bucket=${MODERATION_EVIDENCE_S3_BUCKET:}
moderation.evidence.s3.region=${MODERATION_EVIDENCE_S3_REGION:}
moderation.evidence.s3.key-prefix=${MODERATION_EVIDENCE_S3_KEY_PREFIX:}
moderation.evidence.s3.server-side-encryption=${MODERATION_EVIDENCE_S3_SERVER_SIDE_ENCRYPTION:AES256}

# =========================================================
# STREAM MODERATION - Umbrales por categoria canonica (DEC-1 P2.1).
# Valores: probabilidad [0,1] (orden Sightengine). Ajustables por env
# var MODERATION_THRESHOLDS_<CATEGORIA>_<NIVEL> (Spring relaxed binding).
# MINORS/GORE solo conocen critical (auto-cut); resto AMBER/RED en
# revision humana; SELF_HARM/GAMBLING solo AMBER.
# =========================================================
moderation.thresholds.minors.critical=0.3
moderation.thresholds.gore.critical=0.5
moderation.thresholds.nudity.amber=0.5
moderation.thresholds.nudity.red=0.7
moderation.thresholds.violence.amber=0.5
moderation.thresholds.violence.red=0.7
moderation.thresholds.weapons.amber=0.5
moderation.thresholds.weapons.red=0.7
moderation.thresholds.drugs.amber=0.5
moderation.thresholds.drugs.red=0.7
moderation.thresholds.self-harm.amber=0.4
moderation.thresholds.offensive-symbols.amber=0.5
moderation.thresholds.offensive-symbols.red=0.7
moderation.thresholds.gambling.amber=0.5

# =========================================================
# STREAM MODERATION - Executor pool dedicado (DEC-4 P2.1).
# Aislamiento del adapter Sightengine y del uploader S3 del executor
# Spring por defecto (SimpleAsyncTaskExecutor, sin pool). Bean nombrado
# "moderationExecutor"; los @Async del frente lo referencian explicitos.
# =========================================================
moderation.executor.core-pool-size=20
moderation.executor.max-pool-size=30
moderation.executor.queue-capacity=200

# Frame ingest: cap 5 MB por frame (DEC-7 P2.1).
moderation.frame.max-bytes=5242880

# =========================================================
# Complaints workflow (Opcion B). Email alias dedicado para ack al
# denunciante y para alerta interna al admin (DEC-13). Rate limit publico
# en seccion security.ratelimit.complaint.* mas abajo.
# =========================================================
complaints.email.from=${COMPLAINTS_EMAIL_FROM:safety@sharemechat.com}
complaints.email.admin-alert.to=${COMPLAINTS_EMAIL_ADMIN_ALERT_TO:safety@sharemechat.com}
security.ratelimit.complaint.limit=${SECURITY_RATELIMIT_COMPLAINT_LIMIT:5}
security.ratelimit.complaint.window-seconds=${SECURITY_RATELIMIT_COMPLAINT_WINDOW_SECONDS:3600}

# =========================================================
# Compliance dashboard (DEC-CD-D). TTL signed URL para acceso a evidencia
# S3 desde el panel admin. 10 min default (estandar industria adult/UGC).
# Ventana fija CSV export (DEC-CD-7).
# =========================================================
compliance.evidence.signed-url-ttl-seconds=${COMPLIANCE_EVIDENCE_SIGNED_URL_TTL_SECONDS:600}
compliance.dashboard.csv-export-days=${COMPLIANCE_DASHBOARD_CSV_EXPORT_DAYS:30}

# =========================================================
# Sub-paquete Chat Soporte LLM Fase B.1 (DEC-CS-1..18).
# Vendor: Anthropic Claude API, modelo claude-haiku-4-5.
# Rate limit doble contador (30 msg OR 50K tokens por dia UTC, primero
# que se agote gatilla RATE_LIMITED).
# =========================================================
claude.api.enabled=${CLAUDE_API_ENABLED:true}
claude.api.model=${CLAUDE_API_MODEL:claude-haiku-4-5}
claude.api.base-url=${CLAUDE_API_BASE_URL:https://api.anthropic.com}
claude.api.max-output-tokens=${CLAUDE_API_MAX_OUTPUT_TOKENS:400}
claude.api.timeout-seconds=${CLAUDE_API_TIMEOUT_SECONDS:30}
claude.api.prompt-caching-enabled=${CLAUDE_API_PROMPT_CACHING_ENABLED:true}
claude.api.key=${CLAUDE_API_KEY:}

support.rate-limit.messages-per-day=${SUPPORT_RATE_LIMIT_MESSAGES_PER_DAY:30}
support.rate-limit.tokens-per-day=${SUPPORT_RATE_LIMIT_TOKENS_PER_DAY:50000}
support.bot.user-email=${SUPPORT_BOT_USER_EMAIL:bot+support@sharemechat.com}
support.bot.nickname-default=${SUPPORT_BOT_NICKNAME_DEFAULT:Soporte SharemeChat}
support.kb.directory=${SUPPORT_KB_DIRECTORY:classpath:knowledge-base/}
support.history.messages-window=${SUPPORT_HISTORY_MESSAGES_WINDOW:10}

# =========================================================
# ADR-049 Subpasada 2A: sistema de afiliadas.
# Longitud fija del codigo de afiliacion (Crockford Base32 sin ambiguos).
# 32^12 = 1.15 * 10^18 combinaciones. Colision con 10^5 codigos ~ 10^-13.
# La URL canonica se compone como <app.public.base-url>/i?ref=<code>.
# =========================================================
affiliate.code.length=${AFFILIATE_CODE_LENGTH:12}
