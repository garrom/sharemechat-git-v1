cloudfront:
  distribution_alias: "distribución pública del entorno TEST"
  primary_aliases:
    - test.sharemechat.com
    - www.test.sharemechat.com
  status: Deployed
  default_behavior:
    target_origin: "origen S3 frontend TEST"
    function_associations:
      - name: redirect-spa-test
        event_type: viewer-request
  cache_behaviors:
    - path_pattern: "/.well-known/acme-challenge/*"
      target_origin: api-test-backend
      allowed_methods: [HEAD, GET]
      cache_policy: Managed-CachingOptimized
    - path_pattern: "/api/*"
      target_origin: api-test-backend
      allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
      cache_policy: Managed-CachingDisabled
    - path_pattern: "/match*"
      target_origin: api-test-backend
      allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
      cache_policy: Managed-CachingDisabled
    - path_pattern: "/messages*"
      target_origin: api-test-backend
      allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
      cache_policy: Managed-CachingDisabled
    - path_pattern: "/uploads/*"
      target_origin: api-test-backend
      allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
      cache_policy: Managed-CachingDisabled
    - path_pattern: "/assets/*"
      target_origin: api-test-backend
      allowed_methods: [HEAD, GET]
      cache_policy: Managed-CachingOptimized
    - path_pattern: "/sitemap.xml"
      target_origin: api-test-backend
      allowed_methods: [HEAD, GET]
      cache_policy: Managed-CachingDisabled
    - path_pattern: "/robots.txt"
      target_origin: api-test-backend
      allowed_methods: [HEAD, GET]
      cache_policy: Managed-CachingDisabled
  custom_error_responses:
    - error_code: 404
      response_path: "/index.html"
      response_code: 200

ec2_backend:
  ssh_alias: test-backend
  systemd_services:
    - name: coturn-test.service
      state: active
    - name: nginx.service
      state: active
    - name: redis6.service
      state: active
    - name: sharemechat-test-access-blocker.service
      state: failed
    - name: sharemechat-test-access-classifier.service
      state: not-installed
    - name: sharemechat-test-access-normalizer.service
      state: inactive
    - name: sharemechat-test-daily-report.service
      state: inactive
  jar_running:
    started_at: "2026-05-09T13:20:50Z"
    process_present: true
  nginx:
    config_file: /etc/nginx/conf.d/api.test.sharemechat.com.conf
    location_blocks:
      - path: "/api/"
        proxy_pass: "http://localhost:8080"
      - path: "/match"
        proxy_pass: "http://localhost:8080"
        action: "websocket upgrade (proxy_http_version 1.1, Upgrade/Connection headers)"
      - path: "/messages"
        proxy_pass: "http://localhost:8080"
        action: "websocket upgrade + proxy_read_timeout 3600s, proxy_send_timeout 3600s"
      - path: "= /sitemap.xml"
        proxy_pass: "http://localhost:8080"
      - path: "= /robots.txt"
        proxy_pass: "http://localhost:8080"
      - path: "/"
        proxy_pass: "n/a"
        action: "return 404"
    client_max_body_size: 60M

rds_database:
  endpoint_alias: rds-test
