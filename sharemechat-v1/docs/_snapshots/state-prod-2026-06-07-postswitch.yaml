  notes: |
    Snapshot consolidado de PROD TRAS el switch del origin publico al
    SPA coming-soon (FASE 2 ejecutada el 2026-06-07). La distribucion
    publica E2FWNC80D4QDJC ahora sirve el bucket SPA producto
    (sharemechat-frontend-prod, bundle main.5ae9c641.js) como
    DefaultCacheBehavior; la function redirect-spa-prod ha sido
    publicada a LIVE con los 5 redirects legacy .html -> ruta canonica
    SPA + bypass /api/* + SPA fallback + www->apex; los 11 HTMLs
    estaticos del bucket landing legacy (sharemechat-landing-prod) NO
    se han borrado y siguen disponibles como rollback inmediato.

    Hitos cerrados respecto al snapshot pre-switch (state-prod-2026-06-07.yaml):
      - FASE 1: commits feat(prelaunch) + chore(i18n) (db4f7ef, 4fc45a5)
        y deploy del bundle al bucket sharemechat-frontend-prod en
        modo standby (main.b6c3f312.js -> main.5ae9c641.js).
      - FASE 2: publish-function DEV->LIVE (function ETag E3UN6WX5RRO2AG)
        + update-distribution (default landing -> SPA) + invalidacion /*.
      - Smoke real 7/7 verde: home SPA, 5 estaticas 200, 5 redirects
        legacy 301, www->apex 301, /api/clients/me 503+PRELAUNCH, POST
        /api/auth/login 403 (no 503), bundle servido contiene overlay
        COMING SOON + copy nuevo.
      - Validacion funcional manual del operador end-to-end: registro
        cliente + modelo en sharemechat.com -> email de verificacion ->
        verificacion OK -> PreLaunchScreen con saludo "Bienvenido/a, X."
        y body terminando en "Gracias por elegirnos!" / "Thank you for
        choosing us!".

    Lo que NO se cierra en este snapshot:
      - Deuda SEO: react-helmet por pagina con title/description/og:*
        dinamicos; og:image raster 1200x630 canonico (hoy SVG); GTM con
        env-gate por hostname.
      - Limpieza de los usuarios de prueba cliente+modelo creados durante
        la validacion manual del switch (4 cuentas, garromtrading+*).
      - Transicion futura PRELAUNCH -> OPEN: poner SHOW_IN_PROD=false
        en featureFlags.js + rebuild + redeploy SPA + cambiar
        PRODUCT_ACCESS_MODE=OPEN en /opt/sharemechat/config.env del
        backend + restart sharemechat-prod.service.

