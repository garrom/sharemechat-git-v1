# ============================================================
# BLOQUE 6 - Punto de rollback exacto
# ============================================================
rollback_anchor:
  description: |
    Este snapshot define el estado de PROD JUSTO ANTES del switch del
    origin publico al SPA coming-soon. Si tras el switch hay que
    revertir, el procedimiento es:

      1. aws cloudfront get-distribution-config --id E2FWNC80D4QDJC > current.json
      2. Editar el JSON: DefaultCacheBehavior.TargetOriginId =
         "s3-sharemechat-landing-prod" (recuperar el valor de este snapshot).
      3. aws --profile sharemechat-provisioner cloudfront update-distribution
         --id E2FWNC80D4QDJC --if-match <ETag> --distribution-config file://...
      4. aws cloudfront wait distribution-deployed --id E2FWNC80D4QDJC
      5. aws --profile sharemechat-provisioner cloudfront create-invalidation
         --distribution-id E2FWNC80D4QDJC --paths "/*"

    El bucket sharemechat-landing-prod NO se toca durante el switch y
    queda como rollback inmediato (sus HTMLs siguen ahi, intactos).

    El backend (PRODUCT_ACCESS_MODE=PRELAUNCH con allowlist vacia) NO
    se toca con el switch: el SPA sirve la PreLaunchScreen para
    cualquier visitante (allowlist vacia => fail-closed). Cambiar a
    modo OPEN sigue siendo un cambio de config.env + restart, no
    requiere rebuild.

  current_state:
    cf_publica_default_target: s3-sharemechat-landing-prod
    cf_publica_etag_observed: null  # capturar al hacer get-distribution-config
    spa_bucket_ready: sharemechat-frontend-prod (main.b6c3f312.js, 2026-06-06)
    backend_mode: PRELAUNCH (allowlist vacia)
    rds_snapshot: db1-sharemechat-prod-preswitch-20260607 (creating al momento de captura)
