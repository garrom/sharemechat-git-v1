metadata:
  schema_version: 3
  environment: prod
  generated_at: "2026-05-24T17:22:00Z"
  generated_by: manual-pre-flight@PRO-1
  notes: |
    Snapshot inicial del estado PRO, generado durante PRO-1 (pre-flight del
    provisioning de produccion). Estado pre-PRO-2 a PRO-10. PRO no esta
    provisionado todavia: hosted zone Route53 compartida y dos distribuciones
    CloudFront preexistentes (landing publica y assets), y dos buckets
    multi-env (backups, maintenance) ya en uso por TEST/AUDIT.

    Cobertura: inventario completo de lo que PRO TIENE HOY antes de ejecutar
    PRO-2 a PRO-10, mas observaciones de TEST/AUDIT relevantes para la
    decision de IPs elasticas (Ajuste 2 del plan v2).

    Saneado: aliases logicos siempre que el mapping los provee. Los IDs
    publicos de CloudFront (visibles en headers HTTP de cualquier curl publico)
    se mencionan en notas cuando aportan trazabilidad operativa, pero los
    nombres lógicos son los autoritativos para este snapshot.

    Generado fuera del flujo automatizado de la skill state-inventory:
      - repo.commits_last_24h y repo.adrs no rellenados (este snapshot no
        registra estado de repo; el estado vivo del repo esta en project-log.md
        y en los snapshots TEST/AUDIT recientes).
      - rds_database vacio porque PRO no tiene RDS todavia.

    Resolucion IAM durante PRO-1: el operador crea user dedicado
    sharemechat-provisioner con AdministratorAccess (opcion B del plan v2,
    vida util acotada al frente PRO, desactivacion al cerrar PRO-10).
    Convencion operativa: --profile sharemechat-provisioner para write
    (create/update/delete/put/attach/authorize); perfil default
    (sharemechat-deployer) para read estandar; --profile provisioner tambien
    para lecturas que el deployer no autoriza (describe-addresses,
    describe-key-pairs, get-service-quota, etc.).

