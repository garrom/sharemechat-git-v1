  notes: |
    Snapshot manual tras el cierre del frente PRELAUNCH (commit d48e022:
    "feat(prelaunch): wire PRODUCT_ACCESS_MODE=PRELAUNCH end-to-end +
    harden gate").

    Cobertura: dominios que cambiaron en el frente PRELAUNCH (config.env
    de TEST, bundles de frontend TEST, assets de hero pre-launch en el
    bucket de assets TEST, JAR backend TEST). EC2 TEST esta apagada en
    el momento de generar el snapshot; los detalles on-disk del config.env
    se documentan desde memoria operativa de la sesion (la sesion edito
    el config.env via SSH antes del apagado).

    El snapshot no toca AUDIT ni PROD. AUDIT sigue en PRODUCT_ACCESS_MODE
    OPEN, con su gate operacional desactivado para PSPs. PROD sigue intacto
    a la espera del lanzamiento; cuando llegue, su reversion a OPEN sera
    solo cambio de variable de entorno + restart, sin rebuild.

    Sanitizado: no incluye hostnames RDS reales, ARNs, IPs publicas ni
    credenciales. IDs de CloudFront si se incluyen porque son necesarios
    para identificar las distribuciones invalidadas en esta sesion y ya
    aparecen documentados en docs previas del repo.

