    PRODUCT_REGISTRATION_MODEL_ENABLED: "false"
    notes: |
      AUDIT sigue en modo OPEN para que los PSPs (que estan haciendo
      due diligence) puedan acceder al producto real. Su gate
      operacional esta intencionalmente desactivado. Cuando AUDIT
