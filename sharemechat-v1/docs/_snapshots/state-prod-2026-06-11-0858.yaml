cloudfront:
  distributions:
  - logical_name: frontend_public
    alias: Frontend publico producto PROD (landing legacy hoy; cambio de origin a sharemechat-frontend-prod pendiente para
      el dia del switch publico)
    primary_aliases:
    - sharemechat.com
    - www.sharemechat.com
    status: Deployed
    default_behavior:
      target_origin: frontend_product
      function_associations:
      - name: redirect-spa-prod
        event_type: viewer-request
    cache_behaviors:
    - path_pattern: /sitemap.xml
      target_origin: <raw>:api-prod-backend
      allowed_methods:
      - HEAD
      - DELETE
      - POST
      - GET
      - OPTIONS
      - PUT
      - PATCH
      cache_policy: Managed-CachingDisabled
      origin_request_policy: Managed-AllViewerExceptHostHeader
    - path_pattern: /robots.txt
      target_origin: <raw>:api-prod-backend
      allowed_methods:
      - HEAD
      - DELETE
      - POST
      - GET
      - OPTIONS
      - PUT
      - PATCH
      cache_policy: Managed-CachingDisabled
      origin_request_policy: Managed-AllViewerExceptHostHeader
    - path_pattern: /api/*
      target_origin: <raw>:api-prod-backend
      allowed_methods:
      - HEAD
      - DELETE
      - POST
      - GET
      - OPTIONS
      - PUT
      - PATCH
      cache_policy: Managed-CachingDisabled
      origin_request_policy: Managed-AllViewerExceptHostHeader
    custom_error_responses: []
  - logical_name: backoffice_admin
    alias: Backoffice admin PROD (sin DNS publico hasta hardening)
    primary_aliases:
    - admin.sharemechat.com
    status: Deployed
    default_behavior:
      target_origin: frontend_admin
      function_associations:
      - name: redirect-spa-admin-prod
        event_type: viewer-request
    cache_behaviors:
    - path_pattern: /api/*
      target_origin: <raw>:api-prod-backend
      allowed_methods:
      - HEAD
      - DELETE
      - POST
      - GET
      - OPTIONS
      - PUT
      - PATCH
      cache_policy: Managed-CachingDisabled
      origin_request_policy: Managed-AllViewerExceptHostHeader
    custom_error_responses: []
  - logical_name: assets_canonical
    alias: Assets PROD canonico
    primary_aliases:
    - assets.sharemechat.com
    status: Deployed
    default_behavior:
      target_origin: assets
      function_associations: []
    cache_behaviors: []
    custom_error_responses: []
