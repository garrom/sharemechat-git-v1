    - path: /messages
      proxy_pass: http://localhost:8080
      action: proxy WS
    - path: = /sitemap.xml
      proxy_pass: http://localhost:8080/sitemap.xml
      action: SEO proxy (ADR-033)
    - path: = /robots.txt
      proxy_pass: http://localhost:8080/robots.txt
      action: SEO proxy (ADR-033)
    - path: /  (port 443 catchall)
      proxy_pass: n/a
