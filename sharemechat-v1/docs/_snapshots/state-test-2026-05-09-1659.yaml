cloudfront:
  distributions:
    - logical_name: frontend_public
      alias: "Frontend público producto TEST"
      primary_aliases:
        - test.sharemechat.com
        - www.test.sharemechat.com
      status: Deployed
      default_behavior:
        target_origin: frontend_product
        function_associations:
          - name: redirect-spa-test
            event_type: viewer-request
      cache_behaviors:
        - path_pattern: "/.well-known/acme-challenge/*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, GET]
          cache_policy: Managed-CachingOptimized
        - path_pattern: "/api/*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
          cache_policy: Managed-CachingDisabled
        - path_pattern: "/match*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
          cache_policy: Managed-CachingDisabled
        - path_pattern: "/messages*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
          cache_policy: Managed-CachingDisabled
        - path_pattern: "/uploads/*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
          cache_policy: Managed-CachingDisabled
        - path_pattern: "/assets/*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, GET]
          cache_policy: Managed-CachingOptimized
        - path_pattern: "/sitemap.xml"
          target_origin: api-test-backend
          allowed_methods: [HEAD, GET]
          cache_policy: Managed-CachingDisabled
        - path_pattern: "/robots.txt"
          target_origin: api-test-backend
          allowed_methods: [HEAD, GET]
          cache_policy: Managed-CachingDisabled
      custom_error_responses:
        - error_code: 404
          response_path: "/index.html"
          response_code: 200
    - logical_name: backoffice_admin
      alias: "Backoffice admin TEST"
      primary_aliases:
        - admin.test.sharemechat.com
      status: Deployed
      default_behavior:
        target_origin: frontend_admin
        function_associations: []
      cache_behaviors:
        - path_pattern: "/api/*"
          target_origin: api-test-backend
          allowed_methods: [HEAD, DELETE, POST, GET, OPTIONS, PUT, PATCH]
          cache_policy: Managed-CachingDisabled
      custom_error_responses:
        - error_code: 403
          response_path: "/index.html"
          response_code: 200
        - error_code: 404
          response_path: "/index.html"
          response_code: 200
    - logical_name: assets_canonical
      alias: "Assets TEST canónico"
      primary_aliases:
        - assets.test.sharemechat.com
      status: Deployed
      default_behavior:
        target_origin: assets
        function_associations: []
      cache_behaviors: []
      custom_error_responses: []
    - logical_name: assets_legacy
      alias: "Assets TEST legacy (sin alias DNS)"
      primary_aliases: []
      status: Deployed
      default_behavior:
        target_origin: assets
        function_associations: []
      cache_behaviors: []
      custom_error_responses: []

