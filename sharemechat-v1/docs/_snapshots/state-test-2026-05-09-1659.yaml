  notes: |
    Primer snapshot generado con state-inventory@v1.1 (esquema v2). Itera las
    cuatro distribuciones CloudFront declaradas en el mapping (frontend_public,
    backoffice_admin, assets_canonical, assets_legacy) y los cinco buckets S3
    (frontend_product, frontend_admin, assets, content_private, storage). Sin
    fallos de inventariado: las cuatro distribuciones y los cinco buckets se
    leen correctamente con el AWS CLI configurado. La distribución assets_legacy
    aparece como Status=Deployed pero Enabled=false en AWS (sirve el bucket
    `assets` sin alias DNS); el esquema v2 no tiene campo dedicado para
    enabled, así que el dato queda solo aquí. Backend EC2 levantado a mano
    (java -jar visible en ps con lstart 16:53:00 UTC); systemctl muestra
    coturn-test, nginx y redis6 active, la unidad
    sharemechat-test-access-blocker.service en estado failed (DRY-RUN según
    descripción) y access-classifier reportado como not-found por systemd
    (unit no instalada; se respeta el valor literal sin normalizar). nginx
    sigue con la misma estructura de location blocks que en el snapshot
    previo. Túnel SSH a RDS abierto en localhost:3307; la tabla
    flyway_schema_history sigue ausente en db1_sharemechat_test (las
    migraciones se aplican manualmente desde src/main/resources/db/manual/).

